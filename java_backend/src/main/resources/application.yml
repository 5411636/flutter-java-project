server:
  port: 8080

spring:
  application:
    name: boss-recruitment-backend

  datasource:
    url: jdbc:mysql://localhost:3306/boss_recruitment?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: your_password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

jwt:
  secret: boss-recruitment-secret-key-2024-please-change-in-production-this-key-is-very-long-and-secure-now
  expiration: 604800000  # 7 days in milliseconds

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
