name: Build iOS IPA

on:
  workflow_dispatch

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create fresh Flutter project
        run: |
          flutter create --platforms ios --org com.boss flutter_build
          cp -r flutter_app/lib flutter_build/
          cp flutter_app/pubspec.yaml flutter_build/

      - name: Get dependencies
        run: |
          cd flutter_build
          flutter pub get

      - name: Generate JSON serializable files
        run: |
          cd flutter_build
          dart run build_runner build --delete-conflicting-outputs

      - name: Build iOS IPA (unsigned)
        run: |
          cd flutter_build
          flutter build ipa --export-method=development --no-codesign 2>&1 | tail -30
        env:
          CODE_SIGNING_ALLOWED: "NO"

      - name: Create output directory
        run: |
          mkdir -p build
          cp flutter_build/build/ios/ipa/Runner.ipa build/ 2>/dev/null || echo "IPA not found"
          ls -la build/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: flutter-ios-ipa
          path: build/Runner.ipa
          retention-days: 5

      - name: Download IPA info
        if: success()
        run: |
          ls -la flutter_build/build/ios/ipa/ 2>/dev/null || echo "No ipa dir"