name: Build iOS IPA

on:
  workflow_dispatch

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create fresh Flutter project
        run: |
          flutter create --platforms ios --org com.boss flutter_build
          cp -r flutter_app/lib flutter_build/
          cp flutter_app/pubspec.yaml flutter_build/

      - name: Get dependencies
        run: |
          cd flutter_build
          flutter pub get

      - name: Generate JSON serializable files
        run: |
          cd flutter_build
          dart run build_runner build --delete-conflicting-outputs

      - name: Build iOS via xcodebuild (no signing)
        run: |
          cd flutter_build/ios
          pod install --repo-update
          xcodebuild -workspace Runner.xcworkspace -scheme Runner \
            -configuration Release -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tail -30

      - name: Package as IPA
        run: |
          mkdir -p build
          APP_PATH=$(find flutter_build/build -name "*.app" -type d | head -1)
          echo "Found app at: $APP_PATH"
          if [ -n "$APP_PATH" ]; then
            cp -r "$APP_PATH" build/Runner.app
            cd build && zip -r Runner.ipa Runner.app && cd ..
            ls -la build/
          fi

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: flutter-ios-ipa
          path: build/Runner.ipa
          retention-days: 5