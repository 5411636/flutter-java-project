name: Build iOS IPA

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create fresh Flutter project
        run: |
          flutter create --platforms ios --org com.boss flutter_build
          cp -r flutter_app/lib flutter_build/
          cp flutter_app/pubspec.yaml flutter_build/

      - name: Get dependencies
        run: |
          cd flutter_build
          flutter pub get

      - name: Generate JSON serializable files
        run: |
          cd flutter_build
          dart run build_runner build --delete-conflicting-outputs

      - name: Build iOS for simulator
        run: |
          cd flutter_build
          flutter build ios --simulator --no-codesign 2>&1 | tail -20
        env:
          CODE_SIGNING_ALLOWED: "NO"

      - name: Create output directory
        run: |
          mkdir -p build
          if [ -d "flutter_build/build/ios/iphonesimulator/Runner.app" ]; then
            cp -r flutter_build/build/ios/iphonesimulator/Runner.app build/
          fi
          ls -la build/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-ios-simulator
          path: build/Runner.app

      - name: Upload to Releases
        run: |
          gh release create flutter-ios-v1 --repo 5411636/flutter-java-project --title "Flutter iOS Build v1" build/Runner.ipa || true