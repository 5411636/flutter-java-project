name: Build iOS IPA

on:
  workflow_dispatch

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create fresh Flutter project
        run: |
          flutter create --platforms ios --org com.boss flutter_build
          cp -r flutter_app/lib flutter_build/
          cp flutter_app/pubspec.yaml flutter_build/

      - name: Get dependencies
        run: |
          cd flutter_build
          flutter pub get

      - name: Generate JSON serializable files
        run: |
          cd flutter_build
          dart run build_runner build --delete-conflicting-outputs

      - name: Install iOS pods
        run: |
          cd flutter_build/ios
          pod install --repo-update

      - name: Build iOS
        run: |
          cd flutter_build
          flutter build ios --release --no-codesign 2>&1

      - name: Package IPA
        run: |
          mkdir -p build
          cp -r flutter_build/build/ios/iphonesimulator/Runner.app build/
          cd build && zip -r Runner.ipa Runner.app
          ls -la

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: flutter-ios-ipa
          path: build/Runner.ipa
          retention-days: 5