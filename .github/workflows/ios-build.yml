name: Build iOS IPA

on:
  workflow_dispatch

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create fresh Flutter project
        run: |
          flutter create --platforms ios --org com.boss flutter_build
          cp -r flutter_app/lib flutter_build/
          cp flutter_app/pubspec.yaml flutter_build/

      - name: Get dependencies
        run: |
          cd flutter_build
          flutter pub get

      - name: Generate JSON serializable files
        run: |
          cd flutter_build
          dart run build_runner build --delete-conflicting-outputs

      - name: Build iOS via xcodebuild
        run: |
          cd flutter_build/ios
          # Create a dummy signing identity for ad-hoc build
          security create-keychain build.keychain
          security set-keychain-password -l build.keychain -p "" build.keychain
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain

          # Create dummy certificate
          openssl req -new -newkey rsa:2048 -days 365 -nodes -x509 \
            -keyout test.key.pem -out test.pem \
            -subj "/CN=Test/O=Test/C=US" 2>/dev/null
          security import test.key.pem -k build.keychain -T /usr/bin/codesign -T /usr/bin/security

          # Build with xcodebuild using dummy identity
          xcodebuild -workspace Runner.xcworkspace -scheme Runner \
            -configuration Release -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO build 2>&1 | tail -20

      - name: Create IPA from build
        run: |
          mkdir -p build
          # Find the .app bundle
          APP_PATH=$(find flutter_build/build -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            cp -r "$APP_PATH" build/Runner.app
            # Create zip (which can be renamed to .ipa for ad-hoc testing)
            cd build && zip -r Runner.ipa Runner.app && cd ..
            ls -la build/
          else
            echo "No app bundle found"
            ls -la flutter_build/build/
          fi

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: flutter-ios-ipa
          path: build/Runner.ipa
          retention-days: 5