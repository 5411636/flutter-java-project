name: Build Android APK

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create fresh Flutter project and copy source
        run: |
          # Create new clean flutter project
          flutter create --platforms android flutter_build --project-name boss_recruitment

          # Copy only lib, assets, and pubspec (NOT android - it's broken)
          cp -r flutter_app/lib flutter_build/
          cp flutter_app/pubspec.yaml flutter_build/

          # Replace the android directory with fresh one
          rm -rf flutter_build/android
          cp -r flutter_app/android flutter_build/ || true

      - name: Get dependencies
        run: |
          cd flutter_build
          flutter pub get

      - name: Generate JSON serializable files
        run: |
          cd flutter_build
          dart run build_runner build --delete-conflicting-outputs

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Debug APK
        run: |
          cd flutter_build
          flutter build apk --debug

      - name: Create output directory
        run: |
          mkdir -p build
          cp flutter_build/build/app/outputs/flutter-apk/app-debug.apk build/
          ls -la build/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flutter-android-apk
          path: build/app-debug.apk

      - name: Upload to Releases
        run: |
          gh release create flutter-build-v1 --repo 5411636/flutter-java-project --title "Flutter Android Build v1" build/app-debug.apk || true