name: boss_recruitment
description: Boss直聘风格招聘应用
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  provider: ^6.1.1

  # 网络请求
  dio: ^5.4.0

  # 本地存储
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # UI组件
  cupertino_icons: ^1.0.6

  # 路由
  go_router: ^13.0.0

  # JSON序列化
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  # 如果需要添加资源文件
  # assets:
  #   - images/
